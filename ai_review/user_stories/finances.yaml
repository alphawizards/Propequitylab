  - name: "Properties page add property modal opens"
    url: "https://www.propequitylab.com/login"
    workflow: |
      Navigate to https://www.propequitylab.com/login
      Enter "dev@propequitylab.com" in the email field
      Enter "DevTest2026!" in the password field
      Click the Sign In / login button
      Navigate to https://www.propequitylab.com/finances/properties
      Click the "Add Property" button
      Verify a modal or form opens with fields for: Address, Property Type, Purchase Price, Current Value
      Verify loan detail fields are present: Loan Amount, Interest Rate, Loan Term, Loan Type
      Verify rental income fields are present
      Verify expense fields are present (council rates, insurance, etc.)
      Verify a Save or Submit button is present
      Take a screenshot of the add property modal

