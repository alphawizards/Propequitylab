      Verify the Spending page loads successfully
      Verify an "Add Expense" button is visible
      Verify a search field is present
      Verify category filter options are available
      If expenses exist, verify they show category, description, and amount
      Take a screenshot of the spending page

  - name: "Spending page add expense modal opens"
    url: "https://www.propequitylab.com/login"
