stories:
  - name: "Income page loads and displays income sources"
    url: "https://www.propequitylab.com/login"
    workflow: |
      Navigate to https://www.propequitylab.com/login
      Enter "dev@propequitylab.com" in the email field
      Enter "DevTest2026!" in the password field
      Click the Sign In / login button
      Navigate to https://www.propequitylab.com/finances/income
      Verify the Income page loads successfully
      Verify an "Add Income Source" button is visible
      Verify a search field is present
      Verify filter options are available (by type or owner)
      If income sources exist, verify they display as cards with amount and frequency
      Take a screenshot of the income page

  - name: "Income page add income modal opens"
    url: "https://www.propequitylab.com/login"
    workflow: |
      Navigate to https://www.propequitylab.com/login
      Enter "dev@propequitylab.com" in the email field
      Enter "DevTest2026!" in the password field
      Click the Sign In / login button
      Navigate to https://www.propequitylab.com/finances/income
      Click the "Add Income Source" button
      Verify a modal or form opens with fields: Source type, Amount, Frequency, Owner
      Verify a Save or Submit button is present in the modal
      Take a screenshot of the add income modal

  - name: "Spending page loads and displays expenses"
    url: "https://www.propequitylab.com/login"
